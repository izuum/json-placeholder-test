name: API tests CI

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - 'master'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start tests
        run: mvn clean test

      - name: Save report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: |
             target/site/allure-maven-plugin
             allure-results
